name: Bug report
description: Report incorrect guidance, broken links, or template issues.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Affected file or section
      placeholder: docs/tech-guidelines.md
